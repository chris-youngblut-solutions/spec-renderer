# Dependabot configuration.
# This repo is dependency-free (no npm/cargo/pip manifests with deps); the only
# moving dependency surface is the pinned GitHub Actions in .github/workflows.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
