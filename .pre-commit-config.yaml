# Universal pre-commit floor.
# Language overlays append additional `repos:` entries via `/new-project`'s
# YAML merge step. All repo refs are pinned by tag; pre-commit framework
# does its own SHA verification under the hood when `pre-commit autoupdate`
# is run, but tag pins remain the human-facing record.

minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, commit-msg]
fail_fast: false

repos:
  # Generic file hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: detect-private-key
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
      - id: check-symlinks
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # Secret scanning. Gitleaks is the single source of truth for secret
  # detection at commit time; CI runs it again as belt-and-suspenders.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.22.0
    hooks:
      - id: gitleaks

  # Conventional Commits enforcement.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
