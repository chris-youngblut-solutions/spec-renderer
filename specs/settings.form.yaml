# settings.form.yaml — a service settings/config panel. A proof spec, hand-authored
# in the documented format; nothing here is special-cased in the engine. It exercises:
#   - secret                            (password input, routed to secrets export)  API_TOKEN, WEBHOOK_SECRET
#   - integer + minimum/maximum         (bounded whole number)                       MAX_WORKERS, RETRY_COUNT
#   - number  + minimum/maximum         (bounded fractional)                         REQUEST_TIMEOUT
#   - pattern                           (regex-validated string)                     SERVICE_NAME
#   - annotated-env output              (x-forge-outputs: env-annotated)
# All values travel as strings; quote numeric defaults so they stay strings.
"$schema": "https://json-schema.org/draft/2020-12/schema"
type: "object"
x-forge-kind: "form"
x-forge-name: "service-settings"
title: "Service settings"
x-forge-outputs: ["env-annotated", "json"]
x-forge-env-banner: "# service-settings — generated by spec-renderer.\n# Each setting is annotated with its description.\n\n"
x-forge-groups:
  - id: "identity"
    title: "Identity"
  - id: "limits"
    title: "Limits & timeouts"
    note: "Bounded numeric settings — validated against their min/max."
  - id: "secrets"
    title: "Secrets"
    note: "Routed to variables-secrets.env, never to the public env."
required: ["SERVICE_NAME", "MAX_WORKERS", "API_TOKEN"]
properties:
  SERVICE_NAME:
    type: "string"
    pattern: "^[a-z][a-z0-9-]{2,31}$"
    title: "Service name"
    description: "Lowercase, starts with a letter, 3-32 chars (a-z 0-9 -)."
    status: "fill"
    group: "identity"
  ENVIRONMENT:
    type: "string"
    enum: ["dev", "staging", "prod"]
    default: "prod"
    title: "Environment"
    status: "default"
    group: "identity"
  MAX_WORKERS:
    type: "integer"
    minimum: 1
    maximum: 64
    default: "4"
    title: "Max workers"
    description: "Worker processes (1-64)."
    status: "fill"
    group: "limits"
  RETRY_COUNT:
    type: "integer"
    minimum: 0
    maximum: 10
    default: "3"
    title: "Retry count"
    status: "default"
    group: "limits"
  REQUEST_TIMEOUT:
    type: "number"
    minimum: 0.5
    maximum: 120
    default: "30"
    title: "Request timeout (seconds)"
    status: "default"
    group: "limits"
  API_TOKEN:
    type: "string"
    secret: true
    title: "API token"
    description: "Upstream API credential."
    status: "fill"
    group: "secrets"
  WEBHOOK_SECRET:
    type: "string"
    secret: true
    title: "Webhook signing secret"
    status: "known"
    group: "secrets"
